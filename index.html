                            </div>

                                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                                    </svg>
                                    全文翻译

                    </section>
                    <section class="sentences-panel-section">
                        <div id="deepParseSentencesContainer" class="sentences-container"></div>
                    </section>
                </div>
            </section>

            <!-- Secondary Analysis Container -->
            <div id="secondaryAnalysisContainer" class="secondary-analysis">
                <header class="secondary-header">
                    <button id="backButton" class="icon-only-btn back-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2>📊 分析结果</h2>
                </header>
                
                <div id="originalTextArea" class="original-text">
                    <div class="text-content">
                        <strong class="text-label">📝 英文原文</strong>
                        <span id="originalTextContent" class="text-body">The quick brown fox jumps over the lazy dog. Despite the rain, she decided to go for a walk and enjoyed the fresh air.</span>
                    </div>
                    <button id="copyOriginalTextBtn" class="copy-btn">
                        <svg class="clipboard" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                            <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                        </svg>
                        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/>
                        </svg>
                        <span class="tooltip">复制原文</span>
                    </button>
                </div>

                <div id="secondaryFullTranslationArea" class="secondary-translation">
                    <strong class="translation-label">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="2" y1="12" x2="22" y2="12"/>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                        全文翻译
                    </strong>
                    <span id="secondaryFullTranslationText" class="translation-content">敏捷的棕毛狐狸从懒狗身上跃过。尽管下着雨，她还是决定去散步，并且享受了清新的空气。</span>
                </div>

                <div id="secondarySentencesContainer" class="secondary-sentences"></div>
            </div>

            <!-- Content Area (Shared) -->
            <section id="content-section" class="content-section">
                <div id="contentArea" class="content-area">
                    <div id="sentencesContainer" class="sentences-list"></div>
                </div>
            </section>

    <script>
        window.EnglishLab = window.EnglishLab || {};

        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM 加载完成，开始初始化应用...');

            if (window.ModuleRegistry) {
                console.log('当前注册的模块:', Object.keys(window.ModuleRegistry._modules || {}));
                try {
                    window.ModuleRegistry.initializeAll();
                    console.log('所有模块初始化完成');
                } catch (error) {
                    console.error('初始化模块时出错:', error);
                }
            }

            if (window.MainButtonManager) {
                try {
                    window.MainButtonManager.init();
                    console.log('主按钮初始化完成');
                } catch (error) {
                    console.error('初始化主按钮时出错:', error);
                }
            } else {
                console.error('MainButtonManager 未加载');
            }

            const GlobalManager = ModuleRegistry.get('GlobalManager');
            if (GlobalManager) {
                GlobalManager.initialize({
                    VocabData: window.VocabData,
                    HistoryManager: window.HistoryManager,
                    APIRequest: window.APIRequest,
                    SentenceRenderer: window.SentenceRenderer,
                    CacheManager: window.CacheManager,
                    MainButtonManager: window.MainButtonManager,
                    HighlightService: window.HighlightService,
                    FlashcardMode: window.FlashcardMode,
                    FlashcardUI: window.FlashcardUI,
                    NotebookTabUI: window.NotebookTabUI
                });
                console.log('GlobalManager 初始化完成');
            }

            const copyBtn = document.getElementById('copyOriginalTextBtn');
            if (copyBtn) {
                const tooltip = copyBtn.querySelector('.tooltip');
                
                // 备用复制方法：使用文本区域选择
                function fallbackCopy(text) {
                    const textArea = document.createElement('textarea');
                    textArea.value = text;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-9999px';
                    textArea.style.top = '-9999px';
                    document.body.appendChild(textArea);
                    textArea.select();
                    
                    try {
                        const successful = document.execCommand('copy');
                        document.body.removeChild(textArea);
                        return successful;
                    } catch (err) {
                        document.body.removeChild(textArea);
                        return false;
                    }
                }
                
                copyBtn.addEventListener('click', async () => {
                    const content = document.getElementById('originalTextContent');
                    if (!content) return;
                    
                    const textToCopy = content.textContent;
                    let success = false;
                    
                    // 首先尝试使用 Clipboard API
                    if (navigator.clipboard && window.isSecureContext) {
                        try {
                            await navigator.clipboard.writeText(textToCopy);
                            success = true;
                        } catch (err) {
                            console.warn('Clipboard API 失败，尝试备用方法:', err);
                        }
                    }
                    
                    // 如果 Clipboard API 失败或不可用，使用备用方法
                    if (!success) {
                        success = fallbackCopy(textToCopy);
                    }
                    
                    if (success) {
                        // 切换按钮状态
                        copyBtn.classList.add('copied');
                        if (tooltip) {
                            tooltip.textContent = '已复制';
                        }
                        
                        // 3秒后恢复原始状态
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            if (tooltip) {
                                tooltip.textContent = '复制原文';
                            }
                        }, 3000);
                        
                        const toast = document.getElementById('toast');
                        if (toast) {
                            toast.innerText = '文本已复制到剪贴板';
                            toast.style.opacity = '1';
                            setTimeout(() => toast.style.opacity = '0', 2000);
                        }
                    } else {
                        const toast = document.getElementById('toast');
                        if (toast) {
                            toast.innerText = '复制失败，请手动复制';
                            toast.style.opacity = '1';
                            setTimeout(() => toast.style.opacity = '0', 2000);
                        }
                    }
                });
            }

            window.EnglishLab = {
                ModuleRegistry: window.ModuleRegistry,
                MainButtonManager: window.MainButtonManager,
                SentenceRenderer: window.SentenceRenderer,
                CacheManager: window.CacheManager,
                APIRequest: window.APIRequest,
                VocabData: window.VocabData,
                HistoryManager: window.HistoryManager,
                HighlightService: window.HighlightService,
                FlashcardMode: window.FlashcardMode,
                FlashcardUI: window.FlashcardUI,
                GlobalManager: GlobalManager
            };
        });
    </script>
