<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>英语精读实验室 | 模块化版本</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- 头部卡片 -->
    <div class="card">
        <div class="card-header">
            <h1>📖 英语精读实验室</h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <span id="apiStatusDot" class="status-dot status-red"></span>
                <span id="apiStatusText">未配置</span>
                <button id="settingsBtn" class="icon-btn" style="font-size: 20px;">⚙️</button>
            </div>
        </div>
        <div class="card-body">
            <!-- 主按钮容器（深度解析、生词本） -->
            <div id="mainButtonContainer" class="button-group"></div>
            <!-- 文本输入框容器（深度解析模式下显示） -->
            <div id="textareaContainer"></div>
            <!-- 第二行按钮容器（深度解析模式下显示） -->
            <div id="secondRowContainer" class="button-group"></div>
            <!-- 全文翻译区域 -->
            <div id="fullTranslationArea" style="margin-top: 16px; padding: 12px; background: var(--bg-page); border-radius: 20px; display: none;">
                <strong>🌐 全文翻译</strong><br>
                <span id="fullTranslationText"></span>
            </div>
        </div>
    </div>

    <!-- 动态内容区域（句子列表 或 生词本界面） -->
    <div id="contentArea">
        <div id="sentencesContainer"></div>
    </div>
</div>

<!-- 自定义右键菜单容器 -->
<div id="customMenu" class="custom-menu"></div>

<!-- 设置弹窗容器 -->
<div id="settingsModal" class="modal"></div>

<!-- 词性高亮设置弹窗容器 -->
<div id="posSettingsModal" class="modal"></div>

<!-- 编辑单词释义弹窗容器 -->
<div id="editWordModal" class="modal"></div>

<div id="toast" class="toast"></div>

<!-- 加载所有模块 -->
<script src="cache.js"></script>
<script src="dict.js"></script>

<script src="settings/settings_ui.js"></script>
<script src="settings/api_config.js"></script>
<script src="settings/dark_mode.js"></script>

<script src="main/main_buttons.js"></script>

<script src="main/deep_parse/split.js"></script>
<script src="main/deep_parse/api_request.js"></script>
<script src="main/deep_parse/render.js"></script>
<script src="main/deep_parse/full_translation.js"></script>

<script src="main/deep_parse/second_row/second_row_ui.js"></script>
<script src="main/deep_parse/second_row/highlight_switch.js"></script>
<script src="main/deep_parse/second_row/highlight_render.js"></script>
<script src="main/deep_parse/second_row/highlight_settings.js"></script>
<script src="main/deep_parse/second_row/add_all_pos.js"></script>
<script src="main/deep_parse/second_row/save_analysis.js"></script>
<script src="main/deep_parse/second_row/load_example.js"></script>

<script src="main/deep_parse/sentence_buttons/pos_button.js"></script>
<script src="main/deep_parse/sentence_buttons/syntax_button.js"></script>
<script src="main/deep_parse/sentence_buttons/knowledge_button.js"></script>
<script src="main/deep_parse/sentence_buttons/reload_button.js"></script>

<script src="main/vocab/vocab_data.js"></script>
<script src="main/vocab/vocab_ui.js"></script>
<script src="main/vocab/notebooks/word_menu.js"></script>
<script src="main/vocab/notebooks/vocab_button.js"></script>
<script>
    // 初始化应用（主按钮交互负责启动）
    document.addEventListener('DOMContentLoaded', () => {
        if (window.initApp) window.initApp();
        else console.error('主按钮交互.js 未加载');
    });
</script>
</body>
</html>
