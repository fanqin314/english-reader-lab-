<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>英语精读实验室 | 模块化版本</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="features/deep_parse/pos_highlight/pos_highlight.css">
</head>
<body>
<div class="container">
    <!-- 头部卡片 -->
    <div class="card">
        <div class="card-header">
            <h1>📖 英语精读实验室</h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <span id="apiStatusDot" class="status-dot status-red"></span>
                <span id="apiStatusText">未配置</span>
                <button id="settingsBtn" class="icon-btn" style="font-size: 20px;">⚙️</button>
            </div>
        </div>
        <div class="card-body">
            <!-- 主按钮容器（深度解析、生词本） -->
            <div id="mainButtonContainer" class="button-group"></div>
            <!-- 文本输入框容器（深度解析模式下显示） -->
            <div id="textareaContainer"></div>
            <!-- 第二行按钮容器（深度解析模式下显示） -->
            <div id="secondRowContainer" class="button-group"></div>
            <!-- 全文翻译区域 -->
            <div id="fullTranslationArea" style="margin-top: 16px; padding: 12px; background: var(--bg-page); border-radius: 20px; display: block;">
                <strong>🌐 全文翻译</strong><br>
                <span id="fullTranslationText">敏捷的棕毛狐狸从懒狗身上跃过。尽管下着雨，她还是决定去散步，并且享受了清新的空气。</span>
            </div>
        </div>
    </div>

    <!-- 动态内容区域（句子列表 或 生词本界面） -->
    <div id="contentArea">
        <div id="sentencesContainer"></div>
    </div>

    <!-- 二级分析界面 -->
    <div id="secondaryAnalysisContainer" style="display: none;">
        <div class="secondary-header">
            <button id="backButton" class="back-button">← 返回</button>
            <h2>📊 分析结果</h2>
        </div>
        <div id="originalTextArea" style="margin-top: 16px; padding: 12px; background: var(--bg-page); border-radius: 20px; display: block;">
            <strong>📝 英文原文</strong><br>
            <span id="originalTextContent">The quick brown fox jumps over the lazy dog. Despite the rain, she decided to go for a walk and enjoyed the fresh air.</span>
        </div>
        <div id="secondaryFullTranslationArea" style="margin-top: 16px; padding: 12px; background: var(--bg-page); border-radius: 20px; display: block;">
            <strong>🌐 全文翻译</strong><br>
            <span id="secondaryFullTranslationText">敏捷的棕毛狐狸从懒狗身上跃过。尽管下着雨，她还是决定去散步，并且享受了清新的空气。</span>
        </div>
        <div id="secondarySentencesContainer"></div>
    </div>
</div>

<!-- 自定义右键菜单容器 -->
<div id="customMenu" class="custom-menu"></div>

<!-- 设置弹窗容器 -->
<div id="settingsModal" class="modal"></div>

<!-- 词性高亮设置弹窗容器 -->
<div id="posSettingsModal" class="modal"></div>

<!-- 编辑单词释义弹窗容器 -->
<div id="editWordModal" class="modal"></div>

<div id="toast" class="toast"></div>

<!-- 核心模块 -->
<script src="core/module_registry.js"></script>
<script src="core/di_container.js"></script>
<script src="core/event_bus.js"></script>
<script src="core/error_handler.js"></script>
<script src="core/security.js"></script>
<script src="core/cache.js"></script>
<script src="core/performance.js"></script>
<script src="core/base_analysis_button.js"></script>
<script src="core/global_manager.js"></script>
<script src="core/service_registration.js"></script>

<!-- 字典模块 -->
<script src="modules/dictionary/dict.js"></script>

<!-- 设置界面 -->
<script src="ui/settings/settings_ui.js"></script>
<script src="ui/settings/api_config.js"></script>
<script src="ui/settings/dark_mode.js"></script>

<!-- 主界面 -->
<script src="ui/main_button.js"></script>

    <!-- 分析模块 -->
    <script src="features/deep_parse/sentence_analysis/split.js"></script>
    <script src="core/api_request.js"></script>
    <script src="features/deep_parse/sentence_analysis/sentence_card_render.js"></script>
    <script src="features/deep_parse/full_translation/full_translation_logic.js"></script>

    <!-- 分析界面按钮模块 -->
    <script src="features/deep_parse/sentence_analysis/pos_button.js"></script>
    <script src="features/deep_parse/sentence_analysis/syntax_button.js"></script>
    <script src="features/deep_parse/sentence_analysis/knowledge_button.js"></script>
    <script src="features/deep_parse/sentence_analysis/sentence_translate_button.js"></script>
    <script src="ui/second_row/reload_button.js"></script>
    <script src="modules/analysis/sentence_detail_handler.js"></script>
    <script src="modules/analysis/deep_parse.js"></script>
    <script src="features/history/history_analysis_renderer.js"></script>

    <!-- 分析界面其他模块 -->
    <script src="ui/analysis/second_row_ui.js"></script>

    <!-- 历史记录模块 -->
    <script src="history.js"></script>
    <script src="features/history/history_data.js"></script>
    <script src="features/history/history_list_ui.js"></script>
    <script src="features/history/history_detail_ui.js"></script>

    <!-- 词性高亮功能模块 (重构后) -->
    <script src="features/deep_parse/pos_highlight/highlight_service.js"></script>
    <script src="features/deep_parse/pos_highlight/highlight_controller.js"></script>
    <script src="features/deep_parse/pos_highlight/highlight_render.js"></script>
    <script src="features/deep_parse/pos_highlight/highlight_switch.js"></script>
    <script src="features/deep_parse/pos_highlight/highlight_settings.js"></script>
    <script src="features/deep_parse/pos_highlight/add_all_pos.js"></script>
    <script src="ui/second_row/save_analysis.js"></script>
    <script src="ui/second_row/load_example.js"></script>

    <!-- 词汇模块 -->
    <script src="features/vocabulary/vocab_data.js"></script>
    <script src="features/vocabulary/vocab_ui.js"></script>
    <script src="features/vocabulary/word_context_menu.js"></script>
    <script src="ui/vocabulary/vocab_button.js"></script>

<script>
    // 创建应用命名空间
    window.EnglishLab = window.EnglishLab || {};
    
    // 初始化应用
    document.addEventListener('DOMContentLoaded', () => {
        console.log('DOM 加载完成，开始初始化应用...');
        
        // 检查模块注册情况
        console.log('ModuleRegistry 存在:', typeof window.ModuleRegistry !== 'undefined');
        if (window.ModuleRegistry) {
            console.log('当前注册的模块:', Object.keys(window.ModuleRegistry._modules || {}));
            
            // 尝试初始化所有模块
            console.log('开始初始化所有模块...');
            try {
                window.ModuleRegistry.initializeAll();
                console.log('所有模块初始化完成');
            } catch (error) {
                console.error('初始化模块时出错:', error);
            }
        }
        
        // 初始化主按钮
        console.log('MainButtonManager 存在:', typeof window.MainButtonManager !== 'undefined');
        if (window.MainButtonManager) {
            console.log('初始化主按钮...');
            try {
                window.MainButtonManager.init();
                console.log('主按钮初始化完成');
            } catch (error) {
                console.error('初始化主按钮时出错:', error);
            }
        } else {
            console.error('MainButtonManager 未加载');
        }
        
        // 初始化GlobalManager
        const GlobalManager = ModuleRegistry.get('GlobalManager');
        if (GlobalManager) {
            GlobalManager.initialize({
                VocabData: window.VocabData,
                HistoryManager: window.HistoryManager,
                APIRequest: window.APIRequest,
                SentenceRenderer: window.SentenceRenderer,
                CacheManager: window.CacheManager,
                MainButtonManager: window.MainButtonManager,
                HighlightService: window.HighlightService
            });
            console.log('GlobalManager 初始化完成');
        }

        // 将常用功能挂载到命名空间
        window.EnglishLab = {
            ModuleRegistry: window.ModuleRegistry,
            MainButtonManager: window.MainButtonManager,
            SentenceRenderer: window.SentenceRenderer,
            CacheManager: window.CacheManager,
            APIRequest: window.APIRequest,
            VocabData: window.VocabData,
            HistoryManager: window.HistoryManager,
            HighlightService: window.HighlightService,
            GlobalManager: GlobalManager
        };
    });
</script>


</body>
</html>
